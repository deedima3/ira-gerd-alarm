name: Build and Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Auto bump version
      id: bump_version
      run: |
        # Read current version from build.gradle
        CURRENT_VERSION=$(grep -E 'versionName\s+"[0-9]+\.[0-9]+"' app/build.gradle | grep -oE '"[0-9]+\.[0-9]+"' | tr -d '"')
        CURRENT_CODE=$(grep -E 'versionCode\s+[0-9]+' app/build.gradle | grep -oE '[0-9]+')
        
        echo "Current version: $CURRENT_VERSION (code: $CURRENT_CODE)"
        
        # Parse version components
        MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
        MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
        
        # Bump minor version
        NEW_MINOR=$((MINOR + 1))
        NEW_VERSION="$MAJOR.$NEW_MINOR"
        NEW_CODE=$((CURRENT_CODE + 1))
        
        echo "New version: $NEW_VERSION (code: $NEW_CODE)"
        
        # Update build.gradle
        sed -i "s/versionCode $CURRENT_CODE/versionCode $NEW_CODE/" app/build.gradle
        sed -i "s/versionName \"$CURRENT_VERSION\"/versionName \"$NEW_VERSION\"/" app/build.gradle
        
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "version_code=$NEW_CODE" >> $GITHUB_OUTPUT
        echo "Updated build.gradle"
        grep -E 'versionCode|versionName' app/build.gradle
        
    - name: Commit version bump
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add app/build.gradle
        git commit -m "chore: bump version to ${{ steps.bump_version.outputs.version }}" || echo "No changes to commit"
        git push
        
    - name: Decode Keystore
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -z "$ENCODED_KEYSTORE" ]; then
          echo "Warning: No keystore found. Building debug version."
          echo "To enable release signing, add KEYSTORE_BASE64 secret to GitHub."
        else
          echo "$ENCODED_KEYSTORE" | base64 -d > ira-cute-alarm.keystore
          echo "Keystore created successfully"
        fi
        
    - name: Build with Gradle
      id: build
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -f ira-cute-alarm.keystore ]; then
          # Build release APK with signing
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=ira-cute-alarm.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
          echo "apk_path=app/build/outputs/apk/release" >> $GITHUB_OUTPUT
          echo "apk_pattern=*.apk" >> $GITHUB_OUTPUT
        else
          # Build debug APK
          ./gradlew assembleDebug
          echo "apk_path=app/build/outputs/apk/debug" >> $GITHUB_OUTPUT
          echo "apk_pattern=*.apk" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apk
        path: ${{ steps.build.outputs.apk_path }}/${{ steps.build.outputs.apk_pattern }}
        retention-days: 5
        
    - name: Find APK File
      id: find_apk
      run: |
        APK_FILE=$(find ${{ steps.build.outputs.apk_path }} -name "*.apk" -type f | head -1)
        if [ -z "$APK_FILE" ]; then
          echo "Error: No APK file found"
          exit 1
        fi
        echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT
        echo "Found APK: $APK_FILE"
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.bump_version.outputs.version }}
        tag_name: v${{ steps.bump_version.outputs.version }}
        body: |
          🎉 New version of Ira's Cute Alarm!
          
          **Version:** ${{ steps.bump_version.outputs.version }} (${{ steps.bump_version.outputs.version_code }})
          
          **Changes:**
          - See commits for detailed changes
          
          **Installation:**
          1. Download the APK file below
          2. Enable "Install from unknown sources" in Settings
          3. Install the APK
          4. The app will automatically check for future updates
          
          **Auto-Update:**
          The app includes an OTA update system that checks GitHub Releases automatically.
        files: ${{ steps.find_apk.outputs.apk_file }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Update update.json
      run: |
        VERSION=${{ steps.bump_version.outputs.version }}
        VERSION_CODE=${{ steps.bump_version.outputs.version_code }}
        
        # Get APK filename
        APK_FILENAME=$(basename "${{ steps.find_apk.outputs.apk_file }}")
        
        cat > update.json << EOF
        {
          "versionCode": $VERSION_CODE,
          "versionName": "$VERSION",
          "downloadUrl": "https://github.com/${{ github.repository }}/releases/latest/download/$APK_FILENAME",
          "releaseNotes": "New release version $VERSION",
          "forceUpdate": false,
          "minSdk": 26
        }
        EOF
        
        echo "Generated update.json:"
        cat update.json
        
    - name: Upload update.json
      uses: actions/upload-artifact@v4
      with:
        name: update-json
        path: update.json
        retention-days: 30
